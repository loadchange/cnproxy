name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Standalone CLI binaries (no Node.js needed at runtime) ───────────────────
  # @yao-pkg/pkg cross-compiles, so one Linux runner emits every target.
  cli-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build all CLI binaries
        run: node scripts/build.mjs --pkg

      - name: Stage release assets
        run: |
          mkdir -p out
          # pkg emits one file per target as dist/cnproxy-<os>-<arch>[.exe]; ship them all.
          for f in dist/cnproxy-*; do
            [ "$f" = "dist/cnproxy-*" ] && continue
            cp "$f" "out/$(basename "$f")"
          done
          ls -la out

      - name: Upload CLI binaries to the release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          fail_on_unmatched_files: false

  # ── Native desktop apps (Tauri) for macOS / Windows / Linux ──────────────────
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-targets: aarch64-apple-darwin x86_64-apple-darwin
            tauri-target: universal-apple-darwin
          - os: ubuntu-latest
            rust-targets: x86_64-unknown-linux-gnu
            tauri-target: x86_64-unknown-linux-gnu
          - os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri-target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.tauri-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: cnproxy-app/src-tauri -> target

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Tauri CLI for the app
        run: npm --prefix cnproxy-app install

      - name: Build sidecar binaries
        run: node scripts/build-sidecar.mjs ${{ matrix.rust-targets }}

      - name: Build and publish the Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (optional — set these repo secrets to enable):
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: cnproxy-app
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: "CNProxy ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below. CLI binaries are attached separately."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.tauri-target }}
